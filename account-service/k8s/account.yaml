apiVersion: v1
kind: Service
metadata:
  name: account-service
spec:
  ports:
  - port: 8080
    name: http
  type: LoadBalancer
  selector:
    app: account-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
spec:
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
      - name: account
        image: dthibau/account-service
        ports:
          - containerPort: 8080

      
