spring:
  application:
    name: account-service

---
spring:
  config:
    activate:
      on-profile: netflix
  
  cloud:
    config:
      uri: http://config:8888
      fail-fast: true
      password: ${CONFIG_SERVICE_PASSWORD}
      username: user
    kubernetes:
      config:
        enabled: false
  
---
spring:
  config:
    activate:
      on-profile: kubernetes
      
  cloud:
    config:
      enabled: false
    kubernetes:
      reload:
        enabled: true
      config:
        namespace: default
        sources:
          - name: application-config